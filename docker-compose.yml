version: "3.9"

services:
  nessie:
    image: projectnessie/nessie:0.76.0
    ports:
      - "19120:19120"
    environment:
      nessie.version.store.type: JDBC
      quarkus.datasource.db-kind: postgresql
      quarkus.datasource.username: postgres
      quarkus.datasource.password: lakehouse
      quarkus.datasource.jdbc.url: jdbc:postgresql://postgres:5432/nessie
    depends_on:
      - postgres

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_PASSWORD: lakehouse
      POSTGRES_DB: vectors
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sh:/docker-entrypoint-initdb.d/init.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  marquez:
    image: marquezproject/marquez:latest
    ports:
      - "5000:5000"
      - "5001:5001"
    environment:
      MARQUEZ_CONFIG: /usr/src/app/config.yml
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    entrypoint: ["/bin/bash", "/usr/src/app/entrypoint.sh"]
    volumes:
      - ./marquez/config.yml:/usr/src/app/config.yml
      - ./marquez/entrypoint.sh:/usr/src/app/entrypoint.sh
    depends_on:
      postgres:
        condition: service_healthy

  opa:
    image: openpolicyagent/opa:0.68.0
    command: run --server --addr 0.0.0.0:8181 /policies/policy.rego
    ports:
      - "8181:8181"
    volumes:
      - ./governance:/policies

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NESSIE_URL: http://nessie:19120/api/v1
      SPARK_JAR_DIR: /root/.ivy2/jars
      WAREHOUSE_DIR: /app/iceberg_warehouse
    volumes:
      - ./logs:/app/logs
      - ./iceberg_warehouse:/app/iceberg_warehouse
      - ./data:/app/data
      - ${JAR_DIR}:/root/.ivy2/jars
    depends_on:
      - nessie
      - redis
      - postgres

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
